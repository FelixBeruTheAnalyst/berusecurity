{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-title">AI Security Advisor</div>
  <div class="card" style="height:480px;display:flex;flex-direction:column">
    <h3>Chat with BeruSecurity AI</h3>
    <div id="chat-box" style="flex:1;overflow-y:auto;padding:8px 0;margin-bottom:12px">
      <div style="margin-bottom:16px">
        <div style="font-size:10px;color:#22A39F;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🤖 BeruSecurity AI</div>
        <div class="ai-box">{{opening}}</div>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <input type="text" id="user-input" placeholder="Ask about your security findings..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button class="btn" onclick="sendMsg()" id="send-btn">Send</button>
    </div>
  </div>
</div>
<script>
let history = [
  {role:"user",    content:{{opening|tojson}}},
  {role:"assistant",content:{{opening|tojson}}}
];
async function sendMsg() {
  const input = document.getElementById('user-input');
  const msg   = input.value.trim();
  if (!msg) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  const box = document.getElementById('chat-box');
  box.innerHTML += '<div style="margin-bottom:16px"><div style="font-size:10px;color:#7d8590;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">You</div><div style="background:#1e2a3a;padding:10px 14px;border-radius:8px;font-size:13px">'+msg+'</div></div>';
  box.innerHTML += '<div id="typing" style="margin-bottom:16px"><div style="font-size:10px;color:#22A39F;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🤖 BeruSecurity AI</div><div class="ai-box"><div class="spinner"></div></div></div>';
  box.scrollTop = box.scrollHeight;
  history.push({role:"user",content:msg});
  try {
    const resp = await fetch('/ai-chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({history})
    });
    const d = await resp.json();
    document.getElementById('typing').remove();
    box.innerHTML += '<div style="margin-bottom:16px"><div style="font-size:10px;color:#22A39F;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🤖 BeruSecurity AI</div><div class="ai-box">'+d.reply.replace(/\n/g,'<br>')+'</div></div>';
    history.push({role:"assistant",content:d.reply});
    box.scrollTop = box.scrollHeight;
  } catch(e) {
    document.getElementById('typing').remove();
    box.innerHTML += '<div class="alert alert-error">Error: '+e+'</div>';
  }
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
{% endblock %}
