{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-title">Password Analyzer</div>
  <div class="card">
    <h3>Analyze Password</h3>
    <div style="display:flex;gap:12px;align-items:flex-end">
      <div style="flex:1">
        <label style="font-size:11px;color:#7d8590;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Password</label>
        <input type="text" id="pwd" placeholder="Enter password to analyze...">
      </div>
      <button class="btn" onclick="checkPwd()" id="pwd-btn">Analyze</button>
    </div>
  </div>
  <div id="pwd-results" style="display:none">
    <div class="card">
      <h3>Results</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px">
        <div class="stat-card"><div class="n" id="score-n">—</div><div class="l">Score /100</div></div>
        <div class="stat-card"><div class="n" id="length-n" style="font-size:24px">—</div><div class="l">Length</div></div>
        <div class="stat-card"><div class="n" id="entropy-n" style="font-size:24px">—</div><div class="l">Entropy bits</div></div>
        <div class="stat-card"><div class="n" id="crack-n" style="font-size:16px">—</div><div class="l">Crack time</div></div>
      </div>
      <div id="strength-box" style="padding:10px 16px;border-radius:8px;margin-bottom:16px;font-weight:700;font-size:15px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;color:#7d8590;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Character Mix</div>
          <div id="char-mix" style="font-size:13px;line-height:2"></div>
        </div>
        <div>
          <div style="font-size:11px;color:#7d8590;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Issues Found</div>
          <div id="issues-list" style="font-size:13px;line-height:2"></div>
        </div>
      </div>
      <div id="breach-box" style="margin-top:16px;padding:10px 16px;border-radius:8px;font-size:13px"></div>
      <div style="margin-top:16px">
        <div class="ai-label">🤖 AI Advice</div>
        <div class="ai-box" id="pwd-ai"></div>
      </div>
    </div>
  </div>
  <div id="pwd-loading" style="display:none;text-align:center;padding:40px">
    <div class="spinner"></div>
    <div style="margin-top:12px;color:#7d8590;font-size:13px">Analyzing + checking breach database...</div>
  </div>
</div>
<script>
const SC = {STRONG:'#44cc88',MODERATE:'#ffcc00',WEAK:'#ff8800','VERY WEAK':'#ff4444'};
async function checkPwd() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  document.getElementById('pwd-results').style.display='none';
  document.getElementById('pwd-loading').style.display='block';
  document.getElementById('pwd-btn').disabled=true;
  const fd = new FormData(); fd.append('password',pwd);
  try {
    const resp = await fetch('/password',{method:'POST',body:fd});
    const d    = await resp.json();
    document.getElementById('pwd-loading').style.display='none';
    document.getElementById('pwd-btn').disabled=false;
    document.getElementById('score-n').textContent  = d.score;
    document.getElementById('length-n').textContent = d.length;
    document.getElementById('entropy-n').textContent= d.entropy;
    document.getElementById('crack-n').textContent  = d.crack_time;
    const sb = document.getElementById('strength-box');
    sb.textContent = d.strength;
    sb.style.background = (SC[d.strength]||'#aaa')+'22';
    sb.style.border = '1px solid '+(SC[d.strength]||'#aaa');
    sb.style.color  = SC[d.strength]||'#aaa';
    document.getElementById('char-mix').innerHTML =
      (d.has_lower?'✅':'❌')+' Lowercase<br>'
      +(d.has_upper?'✅':'❌')+' Uppercase<br>'
      +(d.has_digit?'✅':'❌')+' Numbers<br>'
      +(d.has_symbol?'✅':'❌')+' Symbols';
    document.getElementById('issues-list').innerHTML =
      d.issues.length ? d.issues.map(i=>'⚠ '+i).join('<br>') : '✅ No issues';
    const bb = document.getElementById('breach-box');
    if (d.breach > 0) {
      bb.textContent='❌ Found '+d.breach.toLocaleString()+' times in data breaches — change this password immediately';
      bb.style.background='#200d0d'; bb.style.border='1px solid #ff4444'; bb.style.color='#ff4444';
    } else if (d.breach === 0) {
      bb.textContent='✅ Not found in any known breach database';
      bb.style.background='#0d2018'; bb.style.border='1px solid #44cc88'; bb.style.color='#44cc88';
    } else {
      bb.textContent='⚠ Could not reach breach database'; bb.style.background='#1e1e10';
      bb.style.border='1px solid #ffcc00'; bb.style.color='#ffcc00';
    }
    document.getElementById('pwd-ai').textContent = d.ai;
    document.getElementById('pwd-results').style.display='block';
  } catch(e) {
    document.getElementById('pwd-loading').style.display='none';
    document.getElementById('pwd-btn').disabled=false;
  }
}
document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')checkPwd();});
</script>
{% endblock %}
